<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Sip & Energize</title>
</head>

<body>
    <header>
        <div class="header">
            <a href="index.html" class="logo-link">
                <img src="images/cup(1).png" width="50" alt="Sip & Energize logo cup icon">
                <h1>Sip & Energize</h1>
            </a>
            <button href="cart.html" id="cart-toggle" class="icon-button" type="button"
                aria-label="Toggle shopping cart">
                <img src="images/shopping-bag(1).png" class="cart-icon" width="45" alt="Shopping cart icon">
                <span id="cart-count" aria-live="polite">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="cart-panel" class="cart" aria-label="Shopping cart">
            <div id="cart-items">
                <p>No items yet</p>
            </div>

            <p>Subtotal: <span id="subtotal">0</span> EGP</p>

            <a href="checkout.html">
                <button class="add-to-cart" type="button">Checkout</button>
            </a>
        </section>

        <section class="content">
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/SARAYERBAMATESUAVE1KG-removebg-preview.png" alt="Sara Yerba Mate 1KG package">
                </div>
                <div class="product-info">
                    <p class="product-title">Sara Yerba Mate 1KG</p>
                    <p class="product-price">300 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Sara 1KG">Add to
                        Cart</button>
                </div>
            </article>

            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/jj.webp" alt="Yerba Madre Bottle">
                </div>
                <div class="product-info">
                    <p class="product-title">Yerba Madre Bottle</p>
                    <p class="product-price">250 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Yerba Madre Bottle">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/Bombilla straw.webp" alt="Bombilla straw">
                </div>
                <div class="product-info">
                    <p class="product-title">Bombilla straw</p>
                    <p class="product-price">100 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Bombilla straw">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/Rosamonte_Yerba_Mate_tea_500g_-removebg-preview.png    "
                        alt="Rosamonte Yerba Mate 500G package">
                </div>
                <div class="product-info">
                    <p class="product-title">Rosamonte Yerba Mate 500G</p>
                    <p class="product-price">545 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Rosamonte 500G">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/Stainless-Wood-Yerba-Gourd.webp" alt="Yerba Gourd">
                </div>
                <div class="product-info">
                    <p class="product-title">Yerba Gourd</p>
                    <p class="product-price">800 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Yerba Gourd">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/taragui-yerba-original-con-palo-500g-2_800x_a092abce-70fd-419c-b59c-62b1ecd9a11c_1024x1024_2x_webp-removebg-preview(1).png"
                        alt="Yerba Madre Bottle">
                </div>
                <div class="product-info">
                    <p class="product-title">Taragui Yerba Mate 500G</p>
                    <p class="product-price">400 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Yerba Madre Bottle">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/Taragüi_Yerba_Mate_Sin_Palo_-_1_kg-removebg-preview.png" alt="Yerba Madre Bottle">
                </div>
                <div class="product-info">
                    <p class="product-title">Taragui Yerba Mate 1KG</p>
                    <p class="product-price">850 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Yerba Madre Bottle">Add to
                        Cart</button>
                </div>
            </article>
            <article class="product-card">
                <div class="product-image-wrapper">
                    <img src="images/_Yerba_Mate_250G_Kharta__White__Fine_-removebg-preview.png"
                        alt="Yerba Madre Bottle">
                </div>
                <div class="product-info">
                    <p class="product-title">Kharta Yerba Mate 250G</p>
                    <p class="product-price">150 EGP</p>
                    <button class="add-to-cart js-add-to-cart" type="button" data-product="Yerba Madre Bottle">Add to
                        Cart</button>
                </div>
            </article>
        </section>
    </main>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <script src="script.js"></script>
</body>

</html>
