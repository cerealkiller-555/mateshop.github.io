<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Checkout - Sip & Energize</title>
</head>

<body>
    <header>
        <div class="header">
            <a href="index.html" class="logo-link">
                <img src="images/cup(1).png" width="50" alt="Sip & Energize logo cup icon">
                <h1>Sip & Energize</h1>
            </a>
        </div>
    </header>
    <main class="checkout-container">
        <h3>Complete Your Order</h3>

        <div class="checkout-content" id="checkout-content-wrapper">
            <div id="empty-cart-message" class="checkout-message" style="display: none;">
                <h4>Your cart is empty</h4>
                <p>Looks like you haven't added anything to your cart yet.</p>
                <a href="index.html">
                    <button class="add-to-cart" type="button">Return to Shop</button>
                </a>
            </div>

            <div id="order-success-message" class="checkout-message" style="display: none;">
                <h4>Order Successful!</h4>
                <p>Thank you for your purchase. We've sent a confirmation email to you.</p>
                <a href="index.html">
                    <button class="add-to-cart" type="button">Continue Shopping</button>
                </a>
            </div>

            <section id="checkout-cart-summary" class="checkout-summary" aria-label="Order summary">
                <h4>Order Summary</h4>
                <ol id="summary-list"></ol>
                <p id="summary-total"></p>
            </section>

            <form class="checkout-form" id="order-form" aria-label="Checkout form">
                <h4>Shipping Information</h4>

                <label for="fullName">Full Name</label>
                <input id="fullName" type="text" name="fullName" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input id="email" type="email" name="email" placeholder="Enter your email" required>

                <label for="phone">Phone Number</label>
                <input id="phone" type="tel" name="phone" placeholder="Enter your phone number" required>

                <label for="address">Delivery Address</label>
                <textarea id="address" name="address" placeholder="Enter your full address" required></textarea>

                <button type="submit" class="add-to-cart">Confirm Order</button>
            </form>
        </div>
    </main>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            emailjs.init("VxJ3ZKSmXHueBP3aw");
        })();
    </script>
    <script src="script.js"></script>
</body>

</html>
